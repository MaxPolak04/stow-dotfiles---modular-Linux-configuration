# ~/.tmux.conf

# =========================================
# 1. Base Configuration
# =========================================
# Enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# Position status bar at the bottom
set-option -g status-position bottom

# Start window and pane numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# =========================================
# 2. Catppuccin Theme Configuration
# =========================================
# Set flavor
set -g @catppuccin_flavor 'mocha'

# Set window status style
set -g @catppuccin_window_status_style "rounded"

# Set active window background color to Mauve
set -g @catppuccin_window_current_background "#{@thm_mauve}"

# Configure window text and icon
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_status "icon"

# =========================================
# 3. Plugins
# =========================================
# Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# Catppuccin theme
set -g @plugin 'catppuccin/tmux#v2.1.2'

# Status bar modules
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# =========================================
# 4. Status Bar Layout
# =========================================
# Clear default status left
set -g status-left ""
set -g status-right-length 100

# Build status right modules
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# =========================================
# 5. Initialize TPM
# =========================================
run '~/.tmux/plugins/tpm/tpm'
